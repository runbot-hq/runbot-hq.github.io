name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  # cancel-in-progress: true is intentional. If two pushes land in quick
  # succession, the older build is stale and wasteful to complete. Pages
  # deployments are idempotent — the latest build always wins. A cancelled
  # mid-deploy leaves Pages serving the previous version, which is the correct
  # and safe behaviour for a static site. This is not a bug.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest  # intentionally unpinned — ubuntu-latest image changes
                            # are inconsequential for a static site build with no
                            # OS-sensitive native dependencies. Pinning to a specific
                            # image (e.g. ubuntu-24.04) adds maintenance burden with
                            # no security benefit here. Revisit if native deps are added.
    permissions:
      contents: read  # least-privilege: build only needs to read the repo
    steps:
      # Actions are pinned by tag (@v4, @v3), not by commit SHA.
      # This is a deliberate tradeoff for a static marketing site:
      #   - All four actions (checkout, setup-node, upload-pages-artifact,
      #     deploy-pages) are first-party GitHub-owned actions. The risk of a
      #     malicious tag move on github.com/actions/* is materially lower than
      #     for third-party actions.
      #   - SHA-pinning requires manual updates on every action release and
      #     adds maintenance burden with negligible security benefit for this
      #     threat model.
      #   - The deploy job's blast radius is limited to GitHub Pages content —
      #     it cannot write to the repo (contents: read) or access secrets
      #     beyond the scoped OIDC token.
      # Revisit SHA-pinning if third-party actions are ever added, or if this
      # workflow gains access to secrets or write permissions beyond pages.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm' is intentionally omitted.
          # actions/setup-node's npm cache is keyed on package-lock.json. This
          # repo has no lockfile (see rationale below), so the cache would miss
          # on every run — adding cache: 'npm' without a lockfile is a no-op
          # that adds confusion. If a lockfile is ever committed, add
          # cache: 'npm' here at the same time.
          #
          # No lockfile is committed to this repo — this is intentional.
          # Rationale:
          #   - This is a fully static site with no runtime or user-facing
          #     dependency surface. There is no production binary to protect.
          #   - astro is pinned to an exact version (no caret) in package.json
          #     to prevent silent Content Collections drift between builds.
          #   - @astrojs/rss is also exact-pinned for the same reason.
          #   - Transitive deps are floating, which is an accepted tradeoff.
          #     If a transitive dep breaks the build, CI fails loudly.
          #   - See README.md for the full rationale on dependency pinning.
          # Do not add a lockfile or switch to npm ci without discussing this
          # tradeoff — it is a conscious choice, not an oversight.
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest  # intentionally unpinned — see build job comment above
    permissions:
      contents: read  # explicit > implicit; deploy job does not write to repo
      pages: write
      id-token: write # OIDC token for Pages deploy — scoped to deploy job only,
                      # not granted to build job, to minimise attack surface
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
