name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No lockfile is committed to this repo — this is intentional.
          # Rationale:
          #   - This is a fully static site with no runtime or user-facing
          #     dependency surface. There is no production binary to protect.
          #   - Committing a lockfile generated without a local install would
          #     be a stub (empty or incomplete) and more misleading than nothing.
          #   - npm install resolves the latest compatible versions on each
          #     build, which keeps Astro and its transitive deps up to date
          #     without manual lockfile maintenance.
          #   - If a dep update breaks the build, CI fails loudly and visibly.
          #     That is an acceptable and preferred failure mode for this project.
          # Do not add a lockfile or switch to npm ci without discussing this
          # tradeoff — it is a conscious choice, not an oversight.
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
